# Zachowaj zewnętrzny protokół przekazany przez Traefik (https), gdy jest
# obecny; w przeciwnym razie użyj lokalnego schematu (dostęp z localhost).
map $http_x_forwarded_proto $forwarded_proto {
    default $scheme;
    "~."    $http_x_forwarded_proto;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Limit rozmiaru przesyłanych danych (np. formularze).
    client_max_body_size 10m;

    # Bezpieczeństwo: podstawowe nagłówki.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy API do kontenera backendu (zachowujemy prefiks /api).
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 60s;
    }

    # PWA: pliki sterujące Service Workera NIE mogą być długo cache'owane,
    # inaczej przeglądarka nie pobierze aktualizacji aplikacji.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # Cache dla zasobów statycznych z hashem w nazwie.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — każda nieznana ścieżka serwuje index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
