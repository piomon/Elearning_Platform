server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Limit rozmiaru przesyłanych danych (np. formularze).
    client_max_body_size 10m;

    # Bezpieczeństwo: podstawowe nagłówki.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy API do kontenera backendu (zachowujemy prefiks /api).
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Cache dla zasobów statycznych z hashem w nazwie.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — każda nieznana ścieżka serwuje index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
