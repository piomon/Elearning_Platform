# ============================================================================
# Konfiguracja BAZOWA (lokalna / development).
#
# Uruchomienie:   docker compose up -d --build
# Podgląd:        http://localhost:8080   (zmienna WEB_PORT w .env)
#
# Dla produkcji nakłada się dodatkowo plik docker-compose.prod.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# ============================================================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app_net

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 8080
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      SESSION_SECRET: ${SESSION_SECRET}
      APP_URL: ${APP_URL:-}
      API_URL: ${API_URL:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      COURSE_PRICE_GROSZ: ${COURSE_PRICE_GROSZ:-}
      COURSE_OLD_PRICE_GROSZ: ${COURSE_OLD_PRICE_GROSZ:-}
      PAYNOW_API_KEY: ${PAYNOW_API_KEY:-}
      PAYNOW_SIGNATURE_KEY: ${PAYNOW_SIGNATURE_KEY:-}
      PAYNOW_ENV: ${PAYNOW_ENV:-sandbox}
      PAYNOW_API_URL: ${PAYNOW_API_URL:-}
      PAYNOW_RETURN_URL: ${PAYNOW_RETURN_URL:-}
      PAYNOW_NOTIFICATION_URL: ${PAYNOW_NOTIFICATION_URL:-}
      BUNNY_LIBRARY_ID: ${BUNNY_LIBRARY_ID:-}
      BUNNY_CDN_HOSTNAME: ${BUNNY_CDN_HOSTNAME:-}
      BUNNY_STREAM_API_KEY: ${BUNNY_STREAM_API_KEY:-}
      BUNNY_STREAM_READONLY_API_KEY: ${BUNNY_STREAM_READONLY_API_KEY:-}
      BUNNY_COLLECTION_DZIAL_1: ${BUNNY_COLLECTION_DZIAL_1:-}
      BUNNY_COLLECTION_DZIAL_2: ${BUNNY_COLLECTION_DZIAL_2:-}
      BUNNY_COLLECTION_DZIAL_3: ${BUNNY_COLLECTION_DZIAL_3:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      CONTACT_EMAIL: ${CONTACT_EMAIL:-}
      CONTACT_FROM_EMAIL: ${CONTACT_FROM_EMAIL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_net

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      args:
        # Klucz PUBLICZNY Clerk jest wbudowywany w statyczny build frontendu.
        # Nigdy nie przekazuj tu CLERK_SECRET_KEY.
        CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
    restart: unless-stopped
    # Dostęp lokalny tylko z localhost (w produkcji ruch idzie przez Traefik).
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app_net

volumes:
  db_data:
    driver: local

networks:
  app_net:
    driver: bridge
