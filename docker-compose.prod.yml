# ============================================================================
# Nakładka PRODUKCYJNA — reverse proxy Traefik + SSL Let's Encrypt.
#
# Użycie (łącznie z plikiem bazowym):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Wymaga w .env:  DOMAIN, ACME_EMAIL  (oraz skierowanego rekordu A domeny na IP VPS).
# Traefik automatycznie:
#   - wystawia certyfikat Let's Encrypt (TLS-ALPN-01),
#   - przekierowuje cały ruch HTTP -> HTTPS,
#   - kieruje ruch do kontenera `web`.
# ============================================================================

services:
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Wymuszenie HTTPS: przekierowanie całego HTTP na HTTPS.
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      # Let's Encrypt.
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.tlschallenge=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - app_net

  web:
    # Ruch publiczny obsługuje Traefik. Port z pliku bazowego jest związany
    # tylko z 127.0.0.1 (localhost VPS) i nie jest wystawiony na świat.
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls=true"
      - "traefik.http.routers.web.tls.certresolver=le"
      - "traefik.http.services.web.loadbalancer.server.port=80"

volumes:
  letsencrypt:
    driver: local
