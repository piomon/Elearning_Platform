openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Physics Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: courses
  - name: progress
  - name: quizzes
  - name: ai
  - name: payments
  - name: contact
  - name: admin
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── AUTH ────────────────────────────────────────────────────────────────────
  # Sign-in / sign-up are handled by Clerk on the client. The backend only
  # exposes profile sync (/auth/me) and a no-op logout for legacy callers.
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── COURSES ─────────────────────────────────────────────────────────────────
  /courses:
    get:
      operationId: listCourses
      tags: [courses]
      responses:
        "200":
          description: List of courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"

  /courses/{slug}:
    get:
      operationId: getCourse
      tags: [courses]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Course with sections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseWithSections"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sections/{sectionId}/topics:
    get:
      operationId: listTopics
      tags: [courses]
      parameters:
        - name: sectionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Topics in section
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Topic"

  /topics/{topicId}:
    get:
      operationId: getTopic
      tags: [courses]
      parameters:
        - name: topicId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Topic detail with elements
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopicDetail"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: No access to course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── PROGRESS ────────────────────────────────────────────────────────────────
  /progress/me:
    get:
      operationId: getMyProgress
      tags: [progress]
      responses:
        "200":
          description: My progress records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Progress"

  /progress:
    post:
      operationId: upsertProgress
      tags: [progress]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgressInput"
      responses:
        "200":
          description: Updated progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Progress"

  /progress/video:
    post:
      operationId: upsertVideoProgress
      tags: [progress]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoProgressInput"
      responses:
        "200":
          description: Updated video progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoProgress"

  /progress/summary:
    get:
      operationId: getProgressSummary
      tags: [progress]
      responses:
        "200":
          description: Aggregated progress summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressSummary"

  /progress/continue:
    get:
      operationId: getContinueProgress
      tags: [progress]
      responses:
        "200":
          description: Last position to continue from
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContinueProgress"

  # ─── QUIZZES ─────────────────────────────────────────────────────────────────
  /quizzes/{quizId}:
    get:
      operationId: getQuiz
      tags: [quizzes]
      parameters:
        - name: quizId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quiz with questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizPublic"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: No access to course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /quizzes/{quizId}/attempts/start:
    post:
      operationId: startQuizAttempt
      tags: [quizzes]
      parameters:
        - name: quizId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Attempt window opened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizAttemptStart"
        "403":
          description: Attempt limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /quizzes/{quizId}/attempts:
    post:
      operationId: submitQuizAttempt
      tags: [quizzes]
      parameters:
        - name: quizId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizAttemptInput"
      responses:
        "201":
          description: Attempt result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizAttemptResult"

  # ─── AI ──────────────────────────────────────────────────────────────────────
  /ai/check:
    post:
      operationId: checkTask
      tags: [ai]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCheckInput"
      responses:
        "200":
          description: AI feedback
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskCheckResult"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai/lesson-chat:
    post:
      operationId: lessonChat
      tags: [ai]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LessonChatInput"
      responses:
        "200":
          description: AI assistant reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonChatResult"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── PAYMENTS ────────────────────────────────────────────────────────────────
  /payments/price:
    get:
      operationId: getCoursePrice
      tags: [payments]
      responses:
        "200":
          description: Current course price
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentPrice"

  /payments/validate-discount:
    post:
      operationId: validateDiscount
      tags: [payments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateDiscountInput"
      responses:
        "200":
          description: Discount applied preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscountPreview"

  /payments/create:
    post:
      operationId: createPayment
      tags: [payments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "200":
          description: Payment created with redirect URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentCreated"

  /payments/webhook:
    post:
      operationId: paymentWebhook
      tags: [payments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookInput"
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /payments/me:
    get:
      operationId: getMyPayments
      tags: [payments]
      responses:
        "200":
          description: My payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"

  /payments/mock-complete/{paymentId}:
    post:
      operationId: mockCompletePayment
      tags: [payments]
      summary: Simulate a completed payment (development/test only)
      description: >-
        Only registered when the server runs outside production (no real payment
        provider configured). Completes the caller's own pending payment and
        grants course access so the post-payment flow can be exercised locally.
        Returns 404 in production.
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Access granted
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
        "404":
          description: Payment not found (or endpoint disabled in production)

  /payments/{id}/verify:
    post:
      operationId: verifyPayment
      tags: [payments]
      summary: Reconcile a payment's status against Paynow
      description: >-
        Authenticated fallback for when the asynchronous Paynow webhook never
        arrives (sandbox, or a VPS whose notification URL is not yet reachable).
        Actively pulls the payment status from Paynow and, on confirmation,
        completes the payment and grants course access (idempotent and race-safe
        with the webhook). Owner-only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reconciled status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentVerifyResult"
        "400":
          description: Invalid payment id
        "404":
          description: Payment not found

  # ─── CONTACT ─────────────────────────────────────────────────────────────────
  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Message received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ─── ADMIN ───────────────────────────────────────────────────────────────────
  /admin/dashboard:
    get:
      operationId: getAdminDashboard
      tags: [admin]
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: filter
          in: query
          schema:
            type: string
            enum: [all, active, no_access, banned]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserList"

  /admin/users/{id}:
    get:
      operationId: getAdminUser
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User profile with details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserDetail"

  /admin/users/{id}/login-stats/{month}:
    get:
      operationId: getUserLoginStats
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: month
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Login statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginStats"

  /admin/users/{id}/ban:
    post:
      operationId: banUser
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BanInput"
      responses:
        "200":
          description: User banned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/users/{id}/unban:
    post:
      operationId: unbanUser
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User unbanned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/users/{id}/access:
    post:
      operationId: grantAccess
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessInput"
      responses:
        "200":
          description: Access granted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
    delete:
      operationId: revokeAccess
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Access revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/payments:
    get:
      operationId: listAdminPayments
      tags: [admin]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Payment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminPayment"

  /admin/payments/{paymentId}/refund:
    post:
      operationId: refundPayment
      tags: [admin]
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefundInput"
      responses:
        "200":
          description: Refund initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefundResult"

  /admin/contact-messages:
    get:
      operationId: listContactMessages
      tags: [admin]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [new, read, replied, closed]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Contact messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactMessageList"

  /admin/contact-messages/{id}:
    patch:
      operationId: updateContactMessage
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactMessageUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactMessage"

  /admin/logs:
    get:
      operationId: listAdminLogs
      tags: [admin]
      parameters:
        - name: action
          in: query
          schema:
            type: string
        - name: entityType
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Admin logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLogList"

  # ─── ADMIN CRUD: COURSES ──────────────────────────────────────────────────────
  /admin/courses:
    get:
      operationId: listAdminCourses
      tags: [admin]
      responses:
        "200":
          description: All courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminCourseTree"
    post:
      operationId: createCourse
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

  /admin/courses/{id}:
    put:
      operationId: updateCourse
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
    delete:
      operationId: deleteCourse
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ─── ADMIN CRUD: SECTIONS ─────────────────────────────────────────────────────
  /admin/sections:
    post:
      operationId: createSection
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SectionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Section"

  /admin/sections/{id}:
    put:
      operationId: updateSection
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SectionInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Section"
    delete:
      operationId: deleteSection
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ─── ADMIN CRUD: TOPICS ──────────────────────────────────────────────────────
  /admin/topics:
    post:
      operationId: createTopic
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopicInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Topic"

  /admin/topics/{id}:
    put:
      operationId: updateTopic
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopicInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Topic"
    delete:
      operationId: deleteTopic
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ─── ADMIN CRUD: VIDEOS ──────────────────────────────────────────────────────
  /admin/videos:
    post:
      operationId: createVideo
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"

  /admin/videos/{id}:
    put:
      operationId: updateVideo
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"
    delete:
      operationId: deleteVideo
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ─── ADMIN CRUD: QUIZZES ─────────────────────────────────────────────────────
  /admin/quizzes:
    post:
      operationId: createQuiz
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"

  /admin/quizzes/{id}:
    put:
      operationId: updateQuiz
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"
    delete:
      operationId: deleteQuiz
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/quizzes/{id}/questions:
    post:
      operationId: createQuizQuestion
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
