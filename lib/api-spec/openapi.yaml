  # ─── PLATFORM SETTINGS ─────────────────────────────────────────────────────
  /admin/settings:
    get:
      operationId: getPlatformSettings
      tags: [admin]
      responses:
        "200":
          description: Platform settings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlatformSetting"
    put:
      operationId: updatePlatformSettings
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformSettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlatformSetting"

  # ─── IMPORT / EXPORT ───────────────────────────────────────────────────────
  /admin/export/lessons:
    get:
      operationId: exportLessons
      tags: [admin]
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum: [csv, json]
      responses:
        "200":
          description: Lessons export (CSV or JSON)
          content:
            text/csv:
              schema:
                type: string
            application/json:
              schema:
                type: array
                items:
                  type: object

  /admin/export/users:
    get:
      operationId: exportUsers
      tags: [admin]
      responses:
        "200":
          description: Users CSV export
          content:
            text/csv:
              schema:
                type: string

  /admin/export/payments:
    get:
      operationId: exportPayments
      tags: [admin]
      responses:
        "200":
          description: Payments CSV export
          content:
            text/csv:
              schema:
                type: string

  /admin/quizzes/{id}/export:
    get:
      operationId: exportQuiz
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quiz JSON export
          content:
            application/json:
              schema:
                type: object

  /admin/quizzes/import:
    post:
      operationId: importQuiz
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizImportInput"
      responses:
        "201":
          description: Imported quiz
          content:
            application/json:
              schema:
                type: object

  # ─── PRE-PUBLISH PREVIEW ───────────────────────────────────────────────────
  /admin/quizzes/{id}/preview:
    get:
      operationId: previewQuiz
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student-shape quiz preview
          content:
            application/json:
              schema:
                type: object

  /admin/preview/landing:
    get:
      operationId: previewLanding
      tags: [admin]
      responses:
        "200":
          description: Landing + FAQ preview
          content:
            application/json:
              schema:
                type: object

  /admin/courses/{id}/preview:
    get:
      operationId: previewCourse
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Course card preview
          content:
            application/json:
              schema:
                type: object

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    # ─── AUTH SCHEMAS ─────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, email, firstName, lastName, role, isBanned, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [user, admin]
        isBanned:
          type: boolean
        bannedReason:
          type: ["string", "null"]
        createdAt:
          type: string
        lastLoginAt:
          type: ["string", "null"]
        hasAccess:
          type: boolean
        accessGrants:
          type: array
          items:
            $ref: "#/components/schemas/AccessGrant"

    AccessGrant:
      type: object
      required: [id, courseId, source, status, validFrom]
      properties:
        id:
          type: integer
        courseId:
          type: integer
        source:
          type: string
        status:
          type: string
        validFrom:
          type: string
        validTo:
          type: ["string", "null"]

    # ─── COURSE SCHEMAS ───────────────────────────────────────────────────────
    Course:
      type: object
      required: [id, title, slug, description, isPublished, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        description:
          type: string
        isPublished:
          type: boolean
        createdAt:
          type: string

    Section:
      type: object
      required: [id, courseId, title, slug, sortOrder, createdAt]
      properties:
        id:
          type: integer
        courseId:
          type: integer
        title:
          type: string
        slug:
          type: string
        sortOrder:
          type: integer
        topicCount:
          type: integer
        createdAt:
          type: string

    CourseWithSections:
      type: object
      required: [id, title, slug, description, isPublished, sections]
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        description:
          type: string
        isPublished:
          type: boolean
        sections:
          type: array
          items:
            $ref: "#/components/schemas/Section"

    # Reusable lesson metadata mixed into every topic/lesson schema.
    LessonMeta:
      type: object
      properties:
        objectives:
          type: ["string", "null"]
        durationMinutes:
          type: ["integer", "null"]
        difficulty:
          type: ["string", "null"]
        accessType:
          type: string
          enum: [free, paid, admin]
        thumbnailUrl:
          type: ["string", "null"]
        metaTitle:
          type: ["string", "null"]
        metaDescription:
          type: ["string", "null"]
        aiEnabled:
          type: boolean

    Topic:
      allOf:
        - $ref: "#/components/schemas/LessonMeta"
        - type: object
          required: [id, sectionId, title, slug, sortOrder, createdAt]
          properties:
            id:
              type: integer
            sectionId:
              type: integer
            title:
              type: string
            slug:
              type: string
            description:
              type: ["string", "null"]
            sortOrder:
              type: integer
            isPreview:
              type: boolean
            hasVideo:
              type: boolean
            hasQuiz:
              type: boolean
            hasTasks:
              type: boolean
            createdAt:
              type: string

    Video:
      type: object
      required: [id, topicId, title, createdAt]
      properties:
        id:
          type: integer
        topicId:
          type: integer
        bunnyVideoId:
          type: ["string", "null"]
        videoUrl:
          type: ["string", "null"]
        embedUrl:
          type: ["string", "null"]
        title:
          type: string
        durationSeconds:
          type: ["integer", "null"]
        sortOrder:
          type: integer
        createdAt:
          type: string

    LessonImage:
      type: object
      required: [id, topicId, imageUrl, sortOrder]
      properties:
        id:
          type: integer
        topicId:
          type: integer
        imageUrl:
          type: string
        alt:
          type: ["string", "null"]
        sortOrder:
          type: integer

    Task:
      type: object
      required: [id, topicId, title, createdAt]
      properties:
        id:
          type: integer
        topicId:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        initialImageUrl:
          type: ["string", "null"]
        aiPromptConfig:
          type: ["object", "null"]
        createdAt:
          type: string

    TopicDetail:
      allOf:
        - $ref: "#/components/schemas/LessonMeta"
        - type: object
          required: [id, sectionId, title, slug, sortOrder, videos, images, tasks]
          properties:
            id:
              type: integer
            sectionId:
              type: integer
            courseId:
              type: ["integer", "null"]
            title:
              type: string
            slug:
              type: string
            description:
              type: ["string", "null"]
            sortOrder:
              type: integer
            isPreview:
              type: boolean
            previousTopicId:
              type: ["integer", "null"]
            nextTopicId:
              type: ["integer", "null"]
            video:
              oneOf:
                - $ref: "#/components/schemas/Video"
                - type: "null"
            videos:
              type: array
              items:
                $ref: "#/components/schemas/Video"
            images:
              type: array
              items:
                $ref: "#/components/schemas/LessonImage"
            quiz:
              oneOf:
                - $ref: "#/components/schemas/QuizPublic"
                - type: "null"
            tasks:
              type: array
              items:
                $ref: "#/components/schemas/Task"

    AdminTopicTree:
      allOf:
        - $ref: "#/components/schemas/LessonMeta"
        - type: object
          required: [id, sectionId, title, slug, sortOrder, status, tasks]
          properties:
            id:
              type: integer
            sectionId:
              type: integer
            title:
              type: string
            slug:
              type: string
            description:
              type: ["string", "null"]
            sortOrder:
              type: integer
            isPreview:
              type: boolean
            status:
              type: string
              enum: [draft, published, hidden, archived]
            images:
              type: array
              items:
                $ref: "#/components/schemas/LessonImage"
            video:
              oneOf:
                - $ref: "#/components/schemas/Video"
                - type: "null"
            quiz:
              oneOf:
                - $ref: "#/components/schemas/Quiz"
                - type: "null"
            tasks:
              type: array
              items:
                $ref: "#/components/schemas/Task"

    AdminSectionTree:
      type: object
      required: [id, courseId, title, slug, sortOrder, status, topics]
      properties:
        id:
          type: integer
        courseId:
          type: integer
        title:
          type: string
        slug:
          type: string
        sortOrder:
          type: integer
        status:
          type: string
          enum: [draft, published, hidden, archived]
        topics:
          type: array
          items:
            $ref: "#/components/schemas/AdminTopicTree"

    AdminCourseTree:
      type: object
      required: [id, title, slug, description, isPublished, status, sections]
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        description:
          type: string
        isPublished:
          type: boolean
        status:
          type: string
          enum: [draft, published, hidden, archived]
        createdAt:
          type: string
        sections:
          type: array
          items:
            $ref: "#/components/schemas/AdminSectionTree"

    # ─── QUIZ SCHEMAS ─────────────────────────────────────────────────────────
    # Reusable quiz behaviour settings mixed into Quiz, QuizPublic and QuizInput.
    QuizSettings:
      type: object
      properties:
        passThreshold:
          type: integer
        maxAttempts:
          type: ["integer", "null"]
        timeLimitMinutes:
          type: ["integer", "null"]
        shuffleQuestions:
          type: boolean
        shuffleAnswers:
          type: boolean
        showScore:
          type: boolean
        showCorrectAnswers:
          type: boolean

    QuizAnswer:
      type: object
      required: [id, questionId, answerLabel, answerText, isCorrect]
      properties:
        id:
          type: integer
        questionId:
          type: integer
        answerLabel:
          type: string
        answerText:
          type: string
        isCorrect:
          type: boolean

    QuizQuestion:
      type: object
      required: [id, quizId, questionText, sortOrder, answers]
      properties:
        id:
          type: integer
        quizId:
          type: integer
        questionText:
          type: string
        explanation:
          type: ["string", "null"]
        points:
          type: integer
        sortOrder:
          type: integer
        answers:
          type: array
          items:
            $ref: "#/components/schemas/QuizAnswer"

    Quiz:
      allOf:
        - $ref: "#/components/schemas/QuizSettings"
        - type: object
          required: [id, topicId, title, questions]
          properties:
            id:
              type: integer
            topicId:
              type: integer
            title:
              type: string
            status:
              type: string
              enum: [draft, published, hidden, archived]
            questions:
              type: array
              items:
                $ref: "#/components/schemas/QuizQuestion"

    QuizAnswerPublic:
      type: object
      required: [id, questionId, answerLabel, answerText]
      properties:
        id:
          type: integer
        questionId:
          type: integer
        answerLabel:
          type: string
        answerText:
          type: string

    QuizQuestionPublic:
      type: object
      required: [id, quizId, questionText, sortOrder, answers]
      properties:
        id:
          type: integer
        quizId:
          type: integer
        questionText:
          type: string
        points:
          type: integer
        sortOrder:
          type: integer
        answers:
          type: array
          items:
            $ref: "#/components/schemas/QuizAnswerPublic"

    QuizPublic:
      allOf:
        - $ref: "#/components/schemas/QuizSettings"
        - type: object
          required: [id, topicId, title, questions]
          properties:
            id:
              type: integer
            topicId:
              type: integer
            title:
              type: string
            questions:
              type: array
              items:
                $ref: "#/components/schemas/QuizQuestionPublic"
            attemptsUsed:
              type: integer
              description: Number of attempts the current user has already made.
            attemptsRemaining:
              type: ["integer", "null"]
              description: Attempts left for the current user, or null when unlimited.

    QuizAttemptAnswerInput:
      type: object
      required: [questionId, selectedAnswerId]
      properties:
        questionId:
          type: integer
        selectedAnswerId:
          type: integer

    QuizAttemptStart:
      type: object
      required: [startToken, startedAt]
      properties:
        startToken:
          type: string
          description: Signed ticket to echo back on submission for timed quizzes.
        startedAt:
          type: integer
          format: int64
          description: Epoch milliseconds when the attempt window opened.
        timeLimitMinutes:
          type: ["integer", "null"]

    QuizAttemptInput:
      type: object
      required: [answers]
      properties:
        answers:
          type: array
          items:
            $ref: "#/components/schemas/QuizAttemptAnswerInput"
        startToken:
          type: string
          description: Start ticket from /attempts/start; required for timed quizzes.

    QuizAttemptAnswerResult:
      type: object
      required: [questionId, selectedAnswerId]
      properties:
        questionId:
          type: integer
        selectedAnswerId:
          type: ["integer", "null"]
        isCorrect:
          type: boolean
          description: Omitted when the quiz hides correct answers (showCorrectAnswers=false).
        correctAnswerId:
          type: ["integer", "null"]
          description: Omitted when the quiz hides correct answers (showCorrectAnswers=false).

    QuizAttemptResult:
      type: object
      required: [passed, passThreshold, answers]
      properties:
        score:
          type: integer
          description: Omitted when the quiz hides the score (showScore=false).
        totalQuestions:
          type: integer
          description: Omitted when the quiz hides the score (showScore=false).
        percentage:
          type: integer
          description: Omitted when the quiz hides the score (showScore=false).
        passed:
          type: boolean
        passThreshold:
          type: integer
        showScore:
          type: boolean
        showCorrectAnswers:
          type: boolean
        answers:
          type: array
          items:
            $ref: "#/components/schemas/QuizAttemptAnswerResult"

    VideoProgressInput:
      type: object
      required: [videoId, watchedSeconds]
      properties:
        videoId:
          type: integer
        watchedSeconds:
          type: number

    VideoProgress:
      type: object
      required: [id, userId, videoId, topicId, watchedSeconds, progressPercent, completed]
      properties:
        id:
          type: integer
        userId:
          type: integer
        videoId:
          type: integer
        topicId:
          type: integer
        watchedSeconds:
          type: integer
        durationSeconds:
          type: ["integer", "null"]
        progressPercent:
          type: integer
        completed:
          type: boolean
        allVideosCompleted:
          type: boolean

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string

    LessonChatInput:
      type: object
      required: [topicId, message]
      properties:
        topicId:
          type: integer
        message:
          type: string
        history:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"

    LessonChatResult:
      type: object
      required: [reply]
      properties:
        reply:
          type: string

    VideoHealthItem:
      type: object
      required: [id, title, topicId, available]
      properties:
        id:
          type: integer
        title:
          type: string
        topicId:
          type: integer
        topicTitle:
          type: string
        sectionTitle:
          type: string
        bunnyVideoId:
          type: ["string", "null"]
        hasEmbed:
          type: boolean
        available:
          type: boolean
        status:
          type: ["integer", "null"]
        statusLabel:
          type: string

    VideoHealthList:
      type: object
      required: [summary, items]
      properties:
        summary:
          type: object
          required: [total, available, missingBunnyId, bunnyConfigured]
          properties:
            total:
              type: integer
            available:
              type: integer
            missingBunnyId:
              type: integer
            bunnyConfigured:
              type: boolean
        items:
          type: array
          items:
            $ref: "#/components/schemas/VideoHealthItem"

    VideoHealthDetail:
      type: object
      required: [id, title, topicId]
      properties:
        id:
          type: integer
        title:
          type: string
        topicId:
          type: integer
        topicTitle:
          type: string
        sectionTitle:
          type: string
        bunnyVideoId:
          type: ["string", "null"]
        embedUrl:
          type: ["string", "null"]
        durationSeconds:
          type: ["integer", "null"]
        health:
          type: ["object", "null"]

    # ─── PROGRESS SCHEMAS ─────────────────────────────────────────────────────
    Progress:
      type: object
      required: [id, userId, courseId, topicId, updatedAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        courseId:
          type: integer
        sectionId:
          type: ["integer", "null"]
        topicId:
          type: integer
        currentElementType:
          type: ["string", "null"]
        status:
          type: string
        videoCompleted:
          type: boolean
        quizCompleted:
          type: boolean
        taskStarted:
          type: boolean
        taskCheckedByAi:
          type: boolean
        updatedAt:
          type: string

    ProgressInput:
      type: object
      required: [topicId]
      description: >-
        Client may only declare its position in a lesson. courseId/sectionId are
        derived server-side from the topic, and the completion flags
        quizCompleted/taskCheckedByAi are set only by the quiz/AI routes after a
        real pass — they are never accepted from the client here.
      properties:
        topicId:
          type: integer
        currentElementType:
          type: string
          enum: [video, quiz, task]
        videoCompleted:
          type: boolean

    ContinueProgress:
      type: object
      properties:
        topicId:
          type: ["integer", "null"]
        sectionId:
          type: ["integer", "null"]
        courseId:
          type: ["integer", "null"]
        topicTitle:
          type: ["string", "null"]
        sectionTitle:
          type: ["string", "null"]
        currentElementType:
          type: ["string", "null"]

    ProgressSummary:
      type: object
      required: [startedTopics, completedTopics, videosCompleted, quizzesCompleted, tasksChecked]
      properties:
        startedTopics:
          type: integer
        completedTopics:
          type: integer
        videosCompleted:
          type: integer
        quizzesCompleted:
          type: integer
        tasksChecked:
          type: integer

    # ─── AI SCHEMAS ───────────────────────────────────────────────────────────
    TaskCheckInput:
      type: object
      required: [taskId, imageBase64]
      properties:
        taskId:
          type: integer
        imageBase64:
          type: string

    TaskCheckResult:
      type: object
      required: [feedback]
      properties:
        feedback:
          type: string
        checkId:
          type: ["integer", "null"]

    # ─── PAYMENT SCHEMAS ──────────────────────────────────────────────────────
    PaymentPrice:
      type: object
      required: [price, currency]
      properties:
        price:
          type: integer
        currency:
          type: string
        oldPrice:
          type: integer
          description: Informational pre-promo price in grosz, shown struck-through.
        promoEnabled:
          type: boolean
        promoLabel:
          type: string
        promoStartsAt:
          type: ["string", "null"]
        promoEndsAt:
          type: ["string", "null"]
        ctaText:
          type: string

    PaymentInput:
      type: object
      required: [courseId]
      properties:
        courseId:
          type: integer
        returnUrl:
          type: string
        discountCode:
          type: ["string", "null"]

    ValidateDiscountInput:
      type: object
      required: [courseId, code]
      properties:
        courseId:
          type: integer
        code:
          type: string

    DiscountPreview:
      type: object
      required: [code, type, value, amountBeforeGrosz, discountGrosz, amountAfterGrosz, currency]
      properties:
        code:
          type: string
        type:
          type: string
          enum: [percent, amount]
        value:
          type: integer
        amountBeforeGrosz:
          type: integer
        discountGrosz:
          type: integer
        amountAfterGrosz:
          type: integer
        currency:
          type: string

    DiscountCode:
      type: object
      required: [id, code, type, value, usedCount, isActive, createdAt]
      properties:
        id:
          type: integer
        code:
          type: string
        type:
          type: string
          enum: [percent, amount]
        value:
          type: integer
        courseId:
          type: ["integer", "null"]
        courseTitle:
          type: ["string", "null"]
        validFrom:
          type: ["string", "null"]
        validTo:
          type: ["string", "null"]
        maxUses:
          type: ["integer", "null"]
        maxUsesPerUser:
          type: ["integer", "null"]
        usedCount:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string

    DiscountInput:
      type: object
      required: [code, type, value]
      properties:
        code:
          type: string
        type:
          type: string
          enum: [percent, amount]
        value:
          type: integer
        courseId:
          type: ["integer", "null"]
        validFrom:
          type: ["string", "null"]
        validTo:
          type: ["string", "null"]
        maxUses:
          type: ["integer", "null"]
        maxUsesPerUser:
          type: ["integer", "null"]
        isActive:
          type: boolean

    DiscountUse:
      type: object
      required: [id, userId, amountBeforeGrosz, discountGrosz, amountAfterGrosz, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        email:
          type: ["string", "null"]
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        paymentId:
          type: ["integer", "null"]
        courseId:
          type: ["integer", "null"]
        amountBeforeGrosz:
          type: integer
        discountGrosz:
          type: integer
        amountAfterGrosz:
          type: integer
        createdAt:
          type: string

    DiscountUses:
      type: object
      required: [code, uses]
      properties:
        code:
          $ref: "#/components/schemas/DiscountCode"
        uses:
          type: array
          items:
            $ref: "#/components/schemas/DiscountUse"

    AdminAccessGrant:
      type: object
      required: [id, userId, courseId, source, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        email:
          type: ["string", "null"]
        firstName:
          type: ["string", "null"]
        lastName:
